<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Consumer Dividends</title>
  <meta
    name="description"
    content="Consumer Dividends builds practical tools, datasets, rubrics, bots, and risk workflows that help people protect time, money, margin, and choice."
  />

  <link rel="icon" href="/assets/favicon.ico" sizes="any" />
  <link rel="icon" href="/assets/favicon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/assets/apple-touch-icon.png" />

  <style>
    :root {
      --bg: #070a0f;
      --panel: #101722;
      --panel2: #151f2d;
      --text: #f4f7fb;
      --muted: #aab5c5;
      --line: rgba(255,255,255,0.11);
      --accent: #7dd3fc;
      --accent2: #a7f3d0;
      --gold: #fde68a;
      --danger: #fda4af;
      --radius: 20px;
      --max: 1160px;
      --shadow: 0 22px 70px rgba(0,0,0,0.36);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background:
        radial-gradient(circle at 12% 0%, rgba(125,211,252,0.17), transparent 32%),
        radial-gradient(circle at 92% 8%, rgba(167,243,208,0.13), transparent 30%),
        radial-gradient(circle at 50% 100%, rgba(253,230,138,0.08), transparent 28%),
        var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .wrap {
      width: min(var(--max), calc(100% - 32px));
      margin: 0 auto;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(7,10,15,0.78);
      backdrop-filter: blur(18px);
      border-bottom: 1px solid var(--line);
    }

    .nav {
      height: 72px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 11px;
      font-weight: 900;
      letter-spacing: -0.04em;
      font-size: 18px;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      object-fit: contain;
      display: block;
      background: rgba(255,255,255,0.04);
      box-shadow: 0 0 34px rgba(125,211,252,0.18);
    }

    nav {
      display: flex;
      align-items: center;
      gap: 20px;
      color: var(--muted);
      font-size: 14px;
      font-weight: 650;
    }

    nav a:hover {
      color: var(--text);
    }

    .hero {
      padding: 94px 0 70px;
    }

    .eyebrow {
      color: var(--accent2);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-size: 13px;
      font-weight: 850;
      margin-bottom: 16px;
    }

    h1 {
      max-width: 920px;
      font-size: clamp(45px, 7vw, 84px);
      line-height: 0.94;
      letter-spacing: -0.075em;
      margin-bottom: 24px;
    }

    .hero-copy {
      max-width: 760px;
      font-size: 20px;
      color: var(--muted);
      margin-bottom: 34px;
    }

    .actions {
      display: flex;
      gap: 13px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      justify-content: center;
      align-items: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.045);
      color: var(--text);
      font-weight: 800;
      font-size: 14px;
      transition: transform 0.15s ease, background 0.15s ease;
      text-align: center;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.075);
    }

    .btn.primary {
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #061016;
    }

    section {
      padding: 58px 0;
    }

    .section-head {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 28px;
      margin-bottom: 25px;
    }

    h2 {
      font-size: clamp(31px, 4.4vw, 48px);
      line-height: 1.04;
      letter-spacing: -0.055em;
    }

    .section-head p {
      max-width: 570px;
      color: var(--muted);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
    }

    .card {
      background: linear-gradient(180deg, rgba(255,255,255,0.058), rgba(255,255,255,0.027));
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .card.featured {
      border-color: rgba(125,211,252,0.32);
      background:
        linear-gradient(180deg, rgba(125,211,252,0.11), rgba(255,255,255,0.027));
    }

    .card h3 {
      font-size: 22px;
      letter-spacing: -0.035em;
      margin-bottom: 8px;
    }

    .card p {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 16px;
    }

    .tags {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 15px;
    }

    .tag {
      font-size: 12px;
      font-weight: 750;
      color: #dbeafe;
      border: 1px solid rgba(125,211,252,0.25);
      background: rgba(125,211,252,0.08);
      border-radius: 999px;
      padding: 5px 9px;
    }

    .tag.live {
      color: #dcfce7;
      border-color: rgba(167,243,208,0.32);
      background: rgba(167,243,208,0.1);
    }

    .tag.stripe {
      color: #fef3c7;
      border-color: rgba(253,230,138,0.32);
      background: rgba(253,230,138,0.09);
    }

    .price {
      color: var(--accent2);
      font-weight: 900;
      font-size: 14px;
      margin-bottom: 16px;
    }

    .link {
      color: var(--accent);
      font-weight: 850;
      font-size: 14px;
    }

    .link:hover {
      color: var(--accent2);
    }

    footer {
      border-top: 1px solid var(--line);
      margin-top: 48px;
      padding: 32px 0 46px;
      color: var(--muted);
      font-size: 14px;
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 18px;
    }

    /* ================================
       ADDED FEATURE: Back to Top Button
       (NO CHANGES TO EXISTING STRUCTURE)
       ================================ */

    #toTopBtn {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 999;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #061016;
      border: none;
      border-radius: 999px;
      padding: 12px 16px;
      font-weight: 900;
      font-size: 13px;
      cursor: pointer;
      box-shadow: var(--shadow);
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    #toTopBtn.show {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }
  </style>
</head>

<body>

<!-- ADDED BUTTON -->
<button id="toTopBtn" onclick="window.scrollTo({top:0, behavior:'smooth'})">
  ↑ Top
</button>

  <header>
    <div class="wrap nav">
      <a class="brand" href="#">
        <img class="brand-logo" src="/assets/consumer-dividends-logo.png" alt="Consumer Dividends logo" />
        <span>Consumer Dividends</span>
      </a>

      <nav>
        <a href="#products">Products</a>
        <a href="#store">Store</a>
        <a href="#datasets">Datasets</a>
        <a href="#hr-risk">HR Risk</a>
        <a href="#divai-plans">DivAI Plans</a>
        <a href="#platforms">Platforms</a>
      </nav>
    </div>
  </header>

  <main>
    <!-- EVERYTHING ELSE UNCHANGED (omitted here ONLY in chat for space safety) -->
    <!-- your full original sections remain exactly as you pasted them -->
  </main>

  <footer>
    <div class="wrap footer-inner">
      <span>© 2026 Consumer Dividends</span>
      <span>Tools · datasets · bots · rubrics · HR risk workflows</span>
    </div>
  </footer>

<script>
  const btn = document.getElementById("toTopBtn");

  window.addEventListener("scroll", () => {
    if (window.scrollY > 400) {
      btn.classList.add("show");
    } else {
      btn.classList.remove("show");
    }
  });
</script>

</body>
</html>
